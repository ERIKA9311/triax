<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRIAX - Restablecer contrasena</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}?v=seguridad-1">
</head>
<body>
    <header>
        <nav class="navbar">
            <a class="logo" href="{{ url_for('home') }}">TRIAX<span>AI</span></a>
            <ul class="nav-links">
                <li><a href="{{ url_for('login') }}">Volver al login</a></li>
            </ul>
        </nav>
    </header>

    <main class="auth-main">
        <section class="auth-panel">
            <span class="eyebrow">Token valido por 30 minutos</span>
            <h1>Nueva <span class="text-gradient">contraseña</span></h1>

            {% include "partials/mensajes.html" %}

            <form method="POST" class="auth-form">
                <label>
                    Nueva contraseña
                    <input type="password" name="password" autocomplete="new-password" minlength="8" required>
                </label>
                <label>
                    Confirmar contraseña
                    <input type="password" name="confirmar_password" autocomplete="new-password" minlength="8" required>
                </label>
                <button type="submit" class="btn-primary">Restablecer contraseña</button>
            </form>
        </section>
    </main>
</body>
</html>
