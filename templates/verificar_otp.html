<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRIAX - Verificar OTP</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}?v=auth-1">
</head>
<body>
    <header>
        <nav class="navbar">
            <a class="logo" href="{{ url_for('home') }}">TRIAX<span>AI</span></a>
            <ul class="nav-links">
                <li><a href="{{ url_for('login') }}">Volver al login</a></li>
            </ul>
        </nav>
    </header>

    <main class="auth-main">
        <section class="auth-panel">
            <span class="eyebrow">Codigo por correo</span>
            <h1>Verificar <span class="text-gradient">acceso</span></h1>

            {% include "partials/mensajes.html" %}

            <form method="POST" class="auth-form">
                <label>
                    Codigo OTP
                    <input
                        type="text"
                        name="codigo_otp"
                        inputmode="numeric"
                        pattern="[0-9]{6}"
                        maxlength="6"
                        autocomplete="one-time-code"
                        required
                    >
                </label>
                <button type="submit" class="btn-primary">Validar codigo</button>
            </form>

            <p class="auth-switch"><a href="{{ url_for('recovery_login') }}">No puedes acceder al correo? Utiliza un codigo de recuperacion</a></p>
        </section>
    </main>
</body>
</html>
